name: Release

on:
  push:
    tags:
      - v*

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: cargo
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
